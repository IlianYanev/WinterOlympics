<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Result - Winter Games</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div style="font-size: 1.2em; font-weight: bold;"><a th:href="@{/}" style="color: white; margin: 0;">❄️ WinterOlympics</a></div>
    <div>
        <a th:href="@{'/public/competitions/' + ${competition.id}}">Back to Leaderboard</a>
    </div>
</div>

<div class="container" style="display: flex; flex-direction: column; align-items: center;">

    <!-- Форма за редакция на Ски Слалом -->
    <form th:if="${type == 'slalom'}" class="auth-form" th:action="@{/admin/results/slalom/edit}" method="post" style="max-width: 500px; width: 100%;">
        <h2 style="text-align: center; color: #003366; margin-top: 0;">Edit Ski Slalom Result</h2>
        <h4 style="text-align: center; color: #666; margin-top: -10px;" th:text="${competition.name}"></h4>
        <h4 style="text-align: center; color: #333; margin-top: -10px;" th:text="'Athlete: ' + ${result.athlete.name}"></h4>

        <input type="hidden" name="resultId" th:value="${result.id}" />

        <div>
            <label for="firstRunTime">First Run Time (seconds)</label>
            <input type="number" step="0.01" id="firstRunTime" name="firstRunTime" th:value="${result.firstRunTime}" required />
        </div>
        <div>
            <label for="secondRunTime">Second Run Time (seconds)</label>
            <input type="number" step="0.01" id="secondRunTime" name="secondRunTime" th:value="${result.secondRunTime}" placeholder="Leave empty if not run yet" />
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="checkbox" id="dnf" name="dnf" style="width: auto; margin: 0;" th:checked="${!result.isFinished}" />
            <label for="dnf" style="margin: 0; color: #e74c3c;">Did Not Finish (DNF)</label>
        </div>

        <button type="submit" style="margin-top: 15px;">Update Result</button>
    </form>

    <!-- Форма за редакция на Биатлон -->
    <form th:if="${type == 'biathlon'}" class="auth-form" th:action="@{/admin/results/biathlon/edit}" method="post" style="max-width: 500px; width: 100%;">
        <h2 style="text-align: center; color: #003366; margin-top: 0;">Edit Biathlon Result</h2>
        <h4 style="text-align: center; color: #666; margin-top: -10px;" th:text="${competition.name}"></h4>
        <h4 style="text-align: center; color: #333; margin-top: -10px;" th:text="'Athlete: ' + ${result.athlete.name}"></h4>

        <input type="hidden" name="resultId" th:value="${result.id}" />

        <div>
            <label for="skiingTime">Skiing Time (minutes)</label>
            <input type="number" step="0.01" id="skiingTime" name="skiingTime" th:value="${result.skiingTime}" required />
        </div>
        <div>
            <label for="misses">Target Misses (1 miss = 1 min penalty)</label>
            <input type="number" id="misses" name="misses" th:value="${result.misses}" required min="0" />
        </div>

        <button type="submit" style="margin-top: 15px;">Update Result</button>
    </form>

</div>
</body>
</html>
