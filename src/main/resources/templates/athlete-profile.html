<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Winter Games</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div style="font-size: 1.2em; font-weight: bold;"><a th:href="@{/}" style="color: white; margin: 0;">❄️ WinterOlympics</a></div>
    <div>
        <a th:href="@{/}">Home</a>
        <form th:action="@{/logout}" method="post" style="display: inline; margin-left: 20px;">
            <button type="submit" style="background: none; color: #ffcc00; border: none; padding: 0; font-size: 1em; cursor: pointer; box-shadow: none;">Logout</button>
        </form>
    </div>
</div>

<div class="container">
    <h2 style="color: #003366; border-bottom: 2px solid #ffcc00; padding-bottom: 10px;">Athlete Profile & Stats</h2>

    <div th:if="${#authorization.expression('hasRole(''ADMIN'')')}">
        <form class="auth-form" th:action="@{/athlete/profile}" method="get" style="max-width: 600px; margin: 20px auto; padding: 20px; flex-direction: row; align-items: center;">
            <label for="athleteId" style="margin-bottom: 0;">Select Profile:</label>
            <select id="athleteId" name="athleteId" style="padding: 10px; border-radius: 6px; border: 1px solid #ccc; flex-grow: 1;">
                <option value="" disabled selected>-- Choose --</option>
                <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.name + ' (' + athlete.country + ')'}"></option>
            </select>
            <button type="submit" style="padding: 10px 20px;">View Stats</button>
        </form>
    </div>

    <div th:if="${selectedAthlete != null}">
        <h3 style="color: #003366; margin-top: 40px;">⛷️ Ski Slalom Results</h3>
        <table>
            <thead>
            <tr>
                <th>Competition</th>
                <th>Run 1</th>
                <th>Run 2</th>
                <th>Total Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="result : ${slalomResults}">
                <td th:text="${result.competition.name}" style="font-weight: bold;"></td>
                <td th:text="${result.firstRunTime} + ' s'"></td>
                <td th:text="${result.secondRunTime} + ' s'"></td>
                <td th:text="${result.totalTime} + ' s'" style="color: #27ae60; font-weight: bold;"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(slalomResults)}">
                <td colspan="4" style="text-align: center; color: #7f8c8d;">No Ski Slalom results found.</td>
            </tr>
            </tbody>
        </table>

        <h3 style="color: #003366; margin-top: 40px;">🎿 Biathlon Results</h3>
        <table>
            <thead>
            <tr>
                <th>Competition</th>
                <th>Skiing Time</th>
                <th>Misses (Penalty)</th>
                <th>Total Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="result : ${biathlonResults}">
                <td th:text="${result.competition.name}" style="font-weight: bold;"></td>
                <td th:text="${result.skiingTime} + ' min'"></td>
                <td th:text="${result.misses} + ' (' + ${result.penaltyTime} + ' min)'" style="color: #e74c3c;"></td>
                <td th:text="${result.totalTime} + ' min'" style="color: #27ae60; font-weight: bold;"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(biathlonResults)}">
                <td colspan="4" style="text-align: center; color: #7f8c8d;">No Biathlon results found.</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
