<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Competitions - Winter Games</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div style="font-size: 1.2em; font-weight: bold;"><a th:href="@{/}" style="color: white; margin: 0;">❄️ WinterOlympics</a></div>
    <div>
        <a th:href="@{/}">Home</a>
    </div>
</div>

<div class="container">
    <h2 style="color: #003366; border-bottom: 2px solid #ffcc00; padding-bottom: 10px;">Official Competitions Roster</h2>

    <table>
        <thead>
        <tr>
            <th>Name</th>
            <th>Type</th>
            <th>Category</th>
            <th>Action</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="comp : ${competitions}">
            <td th:text="${comp.name}" style="font-weight: bold;"></td>
            <td th:text="${comp.type}"></td>
            <td th:text="${comp.genderCategory}"></td>
            <td>
                <a th:href="@{'/public/competitions/' + ${comp.id}}" class="btn-primary" style="padding: 5px 15px; font-size: 0.9em; background-color: #003366; color: white;">View Leaderboard</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(competitions)}">
            <td colspan="4" style="text-align: center; color: #7f8c8d; padding: 30px;">No competitions registered yet.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
