<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Result - Winter Games</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div style="font-size: 1.2em; font-weight: bold;"><a th:href="@{/}" style="color: white; margin: 0;">❄️ WinterOlympics</a></div>
    <div>
        <a th:href="@{/admin/results}">Back to Competitions</a>
    </div>
</div>

<div class="container" style="display: flex; flex-direction: column; align-items: center;">

    <div th:if="${competition.type == 'Ski Slalom'}" style="width: 100%;">
        <form class="auth-form" th:action="@{/admin/results/slalom/run1}" method="post" style="max-width: 500px; margin: 0 auto;">
            <h2 style="text-align: center; color: #003366; margin-top: 0;">Run 1 Registration</h2>
            <h4 style="text-align: center; color: #666; margin-top: -10px;" th:text="${competition.name}"></h4>

            <input type="hidden" name="competitionId" th:value="${competition.id}" />

            <div>
                <label for="athleteId">Select Athlete</label>
                <select id="athleteId" name="athleteId" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;" required>
                    <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.name + ' (' + athlete.country + ')'}"></option>
                </select>
            </div>
            <div>
                <label for="firstRunTime">First Run Time (seconds)</label>
                <input type="number" step="0.01" id="firstRunTime" name="firstRunTime" required />
            </div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="dnf" name="dnf" style="width: auto; margin: 0;" />
                <label for="dnf" style="margin: 0; color: #e74c3c;">Did Not Finish (DNF)</label>
            </div>

            <button type="submit" style="margin-top: 15px;">Save Run 1</button>
        </form>

        <h3 th:if="${not #lists.isEmpty(pendingRun2)}" style="color: #003366; margin-top: 40px; border-bottom: 2px solid #ffcc00; padding-bottom: 10px;">Start List - Run 2 (Reverse Order)</h3>

        <table th:if="${not #lists.isEmpty(pendingRun2)}">
            <thead>
            <tr>
                <th>Order</th>
                <th>Athlete</th>
                <th>Run 1 Time</th>
                <th>Enter Run 2 Time</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="res, stat : ${pendingRun2}">
                <td th:text="${stat.count}" style="font-weight: bold; font-size: 1.2em; color: #003366;"></td>
                <td th:text="${res.athlete.name}"></td>
                <td th:text="${res.firstRunTime} + ' s'"></td>
                <td>
                    <form th:action="@{/admin/results/slalom/run2}" method="post" style="display: flex; gap: 10px; flex-direction: row; box-shadow: none; padding: 0; background: none; width: auto;">
                        <input type="hidden" name="resultId" th:value="${res.id}" />
                        <input type="hidden" name="competitionId" th:value="${competition.id}" />
                        <input type="number" step="0.01" name="secondRunTime" placeholder="Seconds" required style="width: 100px; padding: 5px;" />
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <input type="checkbox" name="dnf" /> DNF
                        </div>
                        <button type="submit" style="padding: 5px 10px; font-size: 0.9em;">Save</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <form th:if="${competition.type == 'Biathlon'}" class="auth-form" th:action="@{/admin/results/biathlon}" method="post" style="max-width: 500px;">
        <h2 style="text-align: center; color: #003366; margin-top: 0;">Add Biathlon Result</h2>
        <h4 style="text-align: center; color: #666; margin-top: -10px;" th:text="${competition.name}"></h4>

        <input type="hidden" name="competitionId" th:value="${competition.id}" />

        <div>
            <label for="athleteIdBiathlon">Select Athlete</label>
            <select id="athleteIdBiathlon" name="athleteId" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;" required>
                <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.name + ' (' + athlete.country + ')'}"></option>
            </select>
        </div>
        <div>
            <label for="skiingTime">Skiing Time (minutes)</label>
            <input type="number" step="0.01" id="skiingTime" name="skiingTime" required />
        </div>
        <div>
            <label for="misses">Target Misses (1 miss = 1 min penalty)</label>
            <input type="number" id="misses" name="misses" required min="0" />
        </div>

        <button type="submit" style="margin-top: 15px;">Save Result</button>
    </form>

</div>
</body>
</html>
