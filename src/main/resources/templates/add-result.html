<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Result - Winter Games</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="navbar">
    <div style="font-size: 1.2em; font-weight: bold;"><a th:href="@{/}" style="color: white; margin: 0;">❄️ WinterOlympics</a></div>
    <div>
        <a th:href="@{/admin/results}">Back to Competitions</a>
    </div>
</div>

<div class="container" style="display: flex; justify-content: center;">

    <form th:if="${competition.type == 'Ski Slalom'}" class="auth-form" th:action="@{/admin/results/slalom}" method="post" style="max-width: 500px;">
        <h2 style="text-align: center; color: #003366; margin-top: 0;">Add Ski Slalom Result</h2>
        <h4 style="text-align: center; color: #666; margin-top: -10px;" th:text="${competition.name}"></h4>

        <input type="hidden" name="competitionId" th:value="${competition.id}" />

        <div>
            <label for="athleteId">Select Athlete</label>
            <select id="athleteId" name="athleteId" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;" required>
                <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.name + ' (' + athlete.country + ')'}"></option>
            </select>
        </div>
        <div>
            <label for="firstRunTime">First Run Time (seconds)</label>
            <input type="number" step="0.01" id="firstRunTime" name="firstRunTime" required />
        </div>
        <div>
            <label for="secondRunTime">Second Run Time (seconds)</label>
            <input type="number" step="0.01" id="secondRunTime" name="secondRunTime" required />
        </div>

        <button type="submit" style="margin-top: 15px;">Save Result</button>
    </form>

    <form th:if="${competition.type == 'Biathlon'}" class="auth-form" th:action="@{/admin/results/biathlon}" method="post" style="max-width: 500px;">
        <h2 style="text-align: center; color: #003366; margin-top: 0;">Add Biathlon Result</h2>
        <h4 style="text-align: center; color: #666; margin-top: -10px;" th:text="${competition.name}"></h4>

        <input type="hidden" name="competitionId" th:value="${competition.id}" />

        <div>
            <label for="athleteId">Select Athlete</label>
            <select id="athleteId" name="athleteId" style="width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px;" required>
                <option th:each="athlete : ${athletes}" th:value="${athlete.id}" th:text="${athlete.name + ' (' + athlete.country + ')'}"></option>
            </select>
        </div>
        <div>
            <label for="skiingTime">Skiing Time (minutes)</label>
            <input type="number" step="0.01" id="skiingTime" name="skiingTime" required />
        </div>
        <div>
            <label for="misses">Target Misses (1 miss = 1 min penalty)</label>
            <input type="number" id="misses" name="misses" required min="0" />
        </div>

        <button type="submit" style="margin-top: 15px;">Save Result</button>
    </form>

</div>
</body>
</html>
